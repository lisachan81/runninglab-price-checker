name: Check Running Lab Prices

on:
  schedule:
    - cron: '0 4 * * *'  # 12:00 PM MYT (UTC+8) daily
  workflow_dispatch:      # Allows you to trigger a manual run from the GitHub UI

jobs:
  check-prices:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # Needed to commit prices.json back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run price checker
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python check_prices.py

      - name: Commit updated price history
        run: |
          git config user.name "price-bot"
          git config user.email "price-bot@users.noreply.github.com"
          git add prices.json
          git diff --staged --quiet || git commit -m "chore: update price history [$(date -u +%Y-%m-%d)]"
          git push
